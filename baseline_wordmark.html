
<style>
@import url('https://fonts.googleapis.com/css2?family=Lora:wght@400;500&display=swap');
.wrap{display:flex;flex-direction:column;align-items:center;gap:48px;padding:40px 24px}
.dark-bg{background:#0E0C0A;border-radius:16px;padding:48px 64px;display:flex;flex-direction:column;align-items:center;gap:32px}
.light-bg{background:#F5F2EC;border-radius:16px;padding:48px 64px;display:flex;flex-direction:column;align-items:center;gap:32px;border:1px solid #DDD8CE}
.wordmark{font-family:'Lora','Georgia',serif;letter-spacing:0.04em;display:flex;align-items:baseline}
.word{font-weight:400}
.cursor{display:inline-block;animation:blink 1.1s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}45%,55%{opacity:0}}
.size-lg .word{font-size:42px}
.size-lg .cursor{font-size:42px;font-weight:300}
.size-md .word{font-size:28px}
.size-md .cursor{font-size:28px;font-weight:300}

.size-xs .word{font-size:13px;letter-spacing:0.06em}
.size-xs .cursor{font-size:13px;font-weight:300}
.label{font-family:-apple-system,sans-serif;font-size:10px;letter-spacing:0.1em;text-transform:uppercase}
.icon-row{display:flex;gap:24px;align-items:center}
.icon-wrap{display:flex;flex-direction:column;align-items:center;gap:10px}
.icon-label{font-family:-apple-system,sans-serif;font-size:10px;letter-spacing:0.08em}
</style>
